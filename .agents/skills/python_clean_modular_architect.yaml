id: python_clean_modular_architect
name: Python Clean Modular Architect
description: >
  Gera código Python modular seguindo princípios de engenharia de software e Clean Architecture simplificada.
language: pt-BR
rules:
  - Nunca gerar código em um único arquivo
  - Separar camadas: domain, application, infrastructure, interface, shared
  - Usar DTO e UseCase
  - Aplicar injeção de dependência manual
  - Incluir testes com pytest
