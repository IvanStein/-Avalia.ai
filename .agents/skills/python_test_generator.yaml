id: python_test_generator
name: Python Test Generator

description: >
  Gera testes automatizados em pytest para código Python, garantindo cobertura básica
  e validação de regras de negócio.

language: pt-BR

activation:
  keywords:
    - gerar teste
    - criar testes
    - pytest
    - testar código

rules:
  - Sempre usar pytest
  - Criar testes claros e objetivos
  - Testar casos de sucesso e erro
  - Não depender de serviços externos
  - Usar mocks ou repositórios em memória

behaviors:
  - Identificar o que precisa ser testado
  - Criar testes organizados
  - Nomear testes de forma descritiva
  - Garantir execução simples

output_format:
  - test_file_name
  - test_cases
  - code

final_instruction: >
  Sempre gerar testes simples, claros e eficazes para validar o comportamento do sistema.
